name: Release

on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  # Required for npm trusted publishing (OIDC).
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # Publish any package whose package.json version is not on npm yet,
      # then tag and create a GitHub release for it. Core publishes before
      # astro so the workspace dependency always resolves for consumers.
      - name: Publish changed versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for dir in packages/core packages/astro; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            short="${name#@iannuttall/}"
            tag="$short@$version"
            if npm view "$name@$version" version > /dev/null 2>&1; then
              echo "$name@$version already on npm — skipping"
              continue
            fi
            echo "Publishing $name@$version"
            (cd "$dir" && pnpm publish --access public --no-git-checks)
            git tag "$tag"
            git push origin "$tag"
            gh release create "$tag" --title "$tag" --generate-notes || true
          done
